name: Auto-format on /format command

on:
  issue_comment:
    types: [created]

jobs:
  format:
    name: Apply Spotless Formatting
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/format') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('repo', pr.data.head.repo.full_name);

      - uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/shared-build-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply formatting
        run: ./gradlew spotlessApply

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify formatting is clean
        if: steps.diff.outputs.changed == 'true'
        run: ./gradlew spotlessCheck

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply spotless formatting"
          git push

      - name: Report result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const changed = '${{ steps.diff.outputs.changed }}' === 'true';
            const success = '${{ job.status }}' === 'success';
            let body;
            if (success && changed) {
              body = '✅ Formatting applied and pushed.';
            } else if (success && !changed) {
              body = '✅ Code is already formatted — nothing to change.';
            } else {
              body = '❌ Formatting was applied but the build failed. Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
